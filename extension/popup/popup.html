<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autofill Demo</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <h3>Filling for you</h3>

    <div class="row">
      <label><input type="checkbox" id="safe" checked /> Modo seguro</label>
    </div>

    <div class="row">
      <input id="token" type="text" placeholder="token (demo-token)" />
      <button id="saveToken">Guardar</button>
    </div>

    <div class="muted">Funciona sobre <b>http://localhost:5173</b> o <b>http://127.0.0.1:5173</b></div>

    <div class="row">
      <button id="scan">Escanear</button>
      <button id="fill">Previsualizar/Llenar</button>
    </div>

    <div class="row">
      <button id="showLogs">Ver bitácora</button>
      <button id="clearLogs">Borrar bitácora</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
